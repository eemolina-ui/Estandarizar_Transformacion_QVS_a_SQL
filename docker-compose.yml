  #  ports:
  #      - "6333:6333"
  #  volumes:
  #    - qdrant_storage_lp:/qdrant_data/qdrant/storage

  qdrant:
    image: qdrant/qdrant:latest
    container_name: Estandarizar_Transformacion_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage_lp:/qdrant/storage
    networks:
      - proyect
    restart: unless-stopped

networks:
  proyect:
    driver: bridge  

volumes:
  qdrant_storage_lp: