version: '3'
services:
  backend:
    build:
      context: .
      dockerfile: backend.dockerfile
    ports:
      - "3000:3000"
    environment:
      - FLASK_ENV=development
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: .
      dockerfile: frontend.dockerfile
    ports:
      - "5173:5173"
    environment:
      - env_file=./frontend/.env
    depends_on:
      - backend
  
  #forecast-service:
